<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AI Chat Nadhif</title>
<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}
.chat-box{
  height:80vh;
  overflow-y:auto;
  padding:10px;
}
.msg{
  margin:10px;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}
.user{
  background:#3b82f6;
  margin-left:auto;
}
.ai{
  background:#1e293b;
}
.input-box{
  display:flex;
  position:fixed;
  bottom:0;
  width:100%;
}
input{
  flex:1;
  padding:10px;
  border:none;
}
button{
  padding:10px;
  background:#22c55e;
  border:none;
  color:white;
}
</style>
</head>
<body>

<div class="chat-box" id="chat"></div>

<div class="input-box">
  <input id="text" placeholder="Ketik pesan...">
  <button onclick="send()">Kirim</button>
</div>

<script>
function send(){
  let input = document.getElementById("text");
  let chat = document.getElementById("chat");

  if(input.value.trim() === "") return;

  // Pesan user
  chat.innerHTML += `<div class="msg user">${input.value}</div>`;

  // Jawaban AI sederhana
  let reply = getAI(input.value);

  setTimeout(()=>{
    chat.innerHTML += `<div class="msg ai">${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  },500);

  input.value="";
}

function getAI(text){
  text = text.toLowerCase();

  if(text.includes("halo")) return "Halo juga Nadhif 😄";
  if(text.includes("nama")) return "Aku AI buatan kamu 😎";
  if(text.includes("dkv")) return "DKV itu desain komunikasi visual 🎨";
  if(text.includes("ai")) return "AI itu alat bantu, bukan pengganti manusia 🤖";

  return "Aku masih AI sederhana 😅";
}
</script>

</body>
  </html>
